name: StickerCutout
options:
  bundleIdPrefix: com.tokyonasu
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.tokyonasu.stickercutout
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: 5.9
    DEVELOPMENT_TEAM: 83VGKGSQUH
    CODE_SIGN_STYLE: Automatic
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    TARGETED_DEVICE_FAMILY: 1
targets:
  StickerCutout:
    type: application
    platform: iOS
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
    sources:
      - StickerCutout
    info:
      path: StickerCutout/Info.plist
      properties:
        CFBundleDisplayName: スタンプ切り出し
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSPhotoLibraryUsageDescription: "アルバムの写真から被写体を切り抜いてスタンプを作るために使います。"
        NSPhotoLibraryAddUsageDescription: "作ったスタンプを写真に保存するために使います。"
        UIUserInterfaceStyle: Light
        ITSAppUsesNonExemptEncryption: false
